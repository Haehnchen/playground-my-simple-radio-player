name: Nightly Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build and publish nightly release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            gobject-introspection \
            libgirepository1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer1.0-dev \
            libgtk-4-dev \
            pkg-config \
            zip

      - name: Build binary
        run: make build

      - name: Package binary
        id: package
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          archive="radioplayer-linux-amd64-${short_sha}.zip"

          strip radioplayer
          zip -j "$archive" radioplayer

          {
            echo "short_sha=$short_sha"
            echo "archive=$archive"
            echo "tag=nightly-$short_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Create nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.package.outputs.tag }}"
          archive="${{ steps.package.outputs.archive }}"
          short_sha="${{ steps.package.outputs.short_sha }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$archive" --clobber
          else
            gh release create "$tag" "$archive" \
              --title "Nightly $short_sha" \
              --notes "Automated nightly build for commit $GITHUB_SHA." \
              --target "$GITHUB_SHA" \
              --prerelease
          fi

      - name: Keep last 10 nightly releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --limit 100 --json tagName,createdAt \
            --jq '. | map(select(.tagName | startswith("nightly-"))) | sort_by(.createdAt) | reverse | .[10:] | .[].tagName' |
          while read -r tag; do
            [ -n "$tag" ] || continue
            gh release delete "$tag" --cleanup-tag --yes
          done
